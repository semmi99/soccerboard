<svg viewBox="0 0 650 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffe100" />
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- pitch background: mowing stripes -->
  <g>
    <rect x="0" y="0" width="650" height="1000" fill="#145f89" />
    <rect x="0" y="0" width="650" height="100" fill="#12557c" />
    <rect x="0" y="200" width="650" height="100" fill="#12557c" />
    <rect x="0" y="400" width="650" height="100" fill="#12557c" />
    <rect x="0" y="600" width="650" height="100" fill="#12557c" />
    <rect x="0" y="800" width="650" height="100" fill="#12557c" />
  </g>

  <!-- pitch markings -->
  <g stroke="rgba(242,167,59,0.85)" stroke-width="2.5" fill="none">
    <rect x="1.5" y="1.5" width="647" height="997" stroke-width="3" />
    <line x1="0" y1="500" x2="650" y2="500" />
    <circle cx="325" cy="500" r="87" />
    <circle cx="325" cy="500" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- top box (attacking end) -->
    <rect x="132.5" y="0" width="385" height="157" />
    <rect x="237.5" y="0" width="175" height="52" />
    <circle cx="325" cy="105" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- bottom box -->
    <rect x="132.5" y="843" width="385" height="157" />
    <rect x="237.5" y="948" width="175" height="52" />
    <circle cx="325" cy="895" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- corner arcs -->
    <path d="M 10,0 A 10,10 0 0 1 0,10" />
    <path d="M 640,0 A 10,10 0 0 0 650,10" />
    <path d="M 10,1000 A 10,10 0 0 0 0,990" />
    <path d="M 640,1000 A 10,10 0 0 1 650,990" />
  </g>

  <!-- overload zone overlay -->
  <ellipse cx="325" cy="235" rx="215" ry="155" fill="#f2a73b" fill-opacity="0.16" stroke="#f2a73b" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="7 6" />
  <g>
    <rect x="278" y="72" width="94" height="32" rx="16" fill="#ffe100" />
    <text x="325" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#0f3d59" letter-spacing="0.5">4 v 3</text>
  </g>

  <!-- run arrow (dashed, off-ball movement) -->
  <path d="M150,215 Q180,175 246,142" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrowGray)" />

  <!-- pass arrow (bent, line-breaking pass) -->
  <path d="M300,340 Q392,288 474,232" fill="none" stroke="#ffe100" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrowGold)" />

  <!-- training equipment: cones marking a channel -->
  <g fill="#fb923c">
    <path d="M64,672 L74,672 L79,690 L59,690 Z" />
    <path d="M64,730 L74,730 L79,748 L59,748 Z" />
  </g>

  <!-- away team (defenders retreating) -->
  <g font-family="system-ui, sans-serif" font-weight="800" font-size="15" text-anchor="middle">
    <g>
      <circle cx="325" cy="55" r="22" fill="none" stroke="#ef4444" stroke-width="2.5" />
      <circle cx="325" cy="55" r="19" fill="#eab308" stroke="#ffffff" stroke-width="2.5" />
      <text x="325" y="60" fill="#111827">1</text>
    </g>
    <g>
      <circle cx="270" cy="150" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="270" y="155" fill="#ffffff">4</text>
    </g>
    <g>
      <circle cx="400" cy="150" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="400" y="155" fill="#ffffff">5</text>
    </g>
    <g>
      <circle cx="325" cy="262" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="325" y="267" fill="#ffffff">6</text>
    </g>
  </g>

  <!-- home team (attacking overload) -->
  <g font-family="system-ui, sans-serif" font-weight="800" font-size="15" text-anchor="middle">
    <g>
      <circle cx="150" cy="210" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="150" y="215" fill="#ffffff">11</text>
    </g>
    <g>
      <circle cx="300" cy="340" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="300" y="345" fill="#ffffff">8</text>
    </g>
    <g>
      <circle cx="325" cy="130" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="325" y="135" fill="#ffffff">9</text>
    </g>
    <!-- highlighted target of the pass -->
    <g filter="url(#glow)">
      <circle cx="480" cy="230" r="27" fill="none" stroke="#ffe100" stroke-width="3" opacity="0.85" />
      <circle cx="480" cy="230" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="480" y="235" fill="#ffffff">7</text>
    </g>
    <text x="480" y="266" fill="#ffffff" font-size="12" font-weight="600" opacity="0.9">L. Schantl</text>
  </g>

  <!-- bottom-left caption: Badge + Titel, shown as independent text objects -->
  <g>
    <rect x="26" y="878" width="112" height="28" rx="14" fill="#ffe100" />
    <text x="82" y="897" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12.5" font-weight="800" fill="#0f3d59" letter-spacing="0.5">SCHRITT 2</text>
    <text x="26" y="935" font-family="system-ui, sans-serif" font-size="27" font-weight="800" fill="#ffffff">Der Steckpass in die Tiefe</text>
  </g>
</svg>
