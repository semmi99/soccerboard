<svg viewBox="0 0 1000 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#ffe100" />
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8" />
    </marker>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- pitch background: mowing stripes -->
  <g>
    <rect x="0" y="0" width="1000" height="650" fill="#145f89" />
    <rect x="0" y="0" width="100" height="650" fill="#12557c" />
    <rect x="200" y="0" width="100" height="650" fill="#12557c" />
    <rect x="400" y="0" width="100" height="650" fill="#12557c" />
    <rect x="600" y="0" width="100" height="650" fill="#12557c" />
    <rect x="800" y="0" width="100" height="650" fill="#12557c" />
  </g>

  <!-- pitch markings -->
  <g stroke="rgba(242,167,59,0.85)" stroke-width="2.5" fill="none">
    <rect x="1.5" y="1.5" width="997" height="647" stroke-width="3" />
    <line x1="500" y1="0" x2="500" y2="650" />
    <circle cx="500" cy="325" r="87" />
    <circle cx="500" cy="325" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- right box (attacking end) -->
    <rect x="843" y="132.5" width="157" height="385" />
    <rect x="948" y="237.5" width="52" height="175" />
    <circle cx="895" cy="325" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- left box -->
    <rect x="0" y="132.5" width="157" height="385" />
    <rect x="0" y="237.5" width="52" height="175" />
    <circle cx="105" cy="325" r="3" fill="rgba(242,167,59,0.85)" stroke="none" />
    <!-- corner arcs -->
    <path d="M 0,10 A 10,10 0 0 1 10,0" />
    <path d="M 990,0 A 10,10 0 0 1 1000,10" />
    <path d="M 1000,640 A 10,10 0 0 1 990,650" />
    <path d="M 10,650 A 10,10 0 0 1 0,640" />
  </g>

  <!-- overload zone overlay -->
  <ellipse cx="800" cy="278" rx="172" ry="205" fill="#f2a73b" fill-opacity="0.16" stroke="#f2a73b" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="7 6" />
  <g>
    <rect x="853" y="130" width="94" height="32" rx="16" fill="#ffe100" />
    <text x="900" y="151" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="800" fill="#0f3d59" letter-spacing="0.5">4 v 3</text>
  </g>

  <!-- run arrow (dashed, off-ball movement) -->
  <path d="M700,155 Q745,120 800,105" fill="none" stroke="#94a3b8" stroke-width="3" stroke-dasharray="9 7" marker-end="url(#arrowGray)" />

  <!-- pass arrow (bent, line-breaking pass) -->
  <path d="M600,420 Q715,372 782,285" fill="none" stroke="#ffe100" stroke-width="4.5" stroke-linecap="round" marker-end="url(#arrowGold)" />

  <!-- training equipment: cones marking a channel -->
  <g fill="#fb923c">
    <path d="M120,555 L130,555 L135,573 L115,573 Z" />
    <path d="M180,555 L190,555 L195,573 L175,573 Z" />
  </g>

  <!-- away team (defenders retreating) -->
  <g font-family="system-ui, sans-serif" font-weight="800" font-size="15" text-anchor="middle">
    <g>
      <circle cx="965" cy="325" r="22" fill="none" stroke="#ef4444" stroke-width="2.5" />
      <circle cx="965" cy="325" r="19" fill="#eab308" stroke="#ffffff" stroke-width="2.5" />
      <text x="965" y="330" fill="#111827">1</text>
    </g>
    <g>
      <circle cx="850" cy="200" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="850" y="205" fill="#ffffff">4</text>
    </g>
    <g>
      <circle cx="850" cy="380" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="850" y="385" fill="#ffffff">5</text>
    </g>
    <g>
      <circle cx="738" cy="290" r="19" fill="#ef4444" stroke="#ffffff" stroke-width="2.5" />
      <text x="738" y="295" fill="#ffffff">6</text>
    </g>
  </g>

  <!-- home team (attacking overload) -->
  <g font-family="system-ui, sans-serif" font-weight="800" font-size="15" text-anchor="middle">
    <g>
      <circle cx="700" cy="150" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="700" y="155" fill="#ffffff">11</text>
    </g>
    <g>
      <circle cx="600" cy="420" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="600" y="425" fill="#ffffff">8</text>
    </g>
    <g>
      <circle cx="905" cy="415" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="905" y="420" fill="#ffffff">9</text>
    </g>
    <!-- highlighted target of the pass -->
    <g filter="url(#glow)">
      <circle cx="800" cy="278" r="27" fill="none" stroke="#ffe100" stroke-width="3" opacity="0.85" />
      <circle cx="800" cy="278" r="19" fill="#3b82f6" stroke="#ffffff" stroke-width="2.5" />
      <text x="800" y="283" fill="#ffffff">7</text>
    </g>
    <text x="800" y="317" fill="#ffffff" font-size="12" font-weight="600" opacity="0.9">L. Schantl</text>
  </g>

  <!-- bottom-left caption: Badge + Titel, shown as independent text objects -->
  <g>
    <rect x="26" y="560" width="112" height="28" rx="14" fill="#ffe100" />
    <text x="82" y="579" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12.5" font-weight="800" fill="#0f3d59" letter-spacing="0.5">SCHRITT 2</text>
    <text x="26" y="614" font-family="system-ui, sans-serif" font-size="24" font-weight="800" fill="#ffffff">Der Steckpass in die Tiefe</text>
  </g>
</svg>
